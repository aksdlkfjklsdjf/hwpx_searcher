name: Manual release build

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create or update, for example v0.1.0"
        required: true
        default: "v0.1.0"
      release_title:
        description: "Release title. Defaults to the tag name when empty."
        required: false
        default: ""
      draft:
        description: "Create a draft release"
        required: true
        type: boolean
        default: false
      prerelease:
        description: "Mark as a prerelease"
        required: true
        type: boolean
        default: false
      use_rhwp_git:
        description: "Build with @rhwp/core fetched from a GitHub repo (for unreleased HWP 3.0 support)"
        required: true
        type: boolean
        default: false
      rhwp_git_repo:
        description: "GitHub owner/repo for @rhwp/core source when use_rhwp_git=true"
        required: false
        default: "edwardkim/rhwp"
      rhwp_git_ref:
        description: "Git ref (branch/tag/commit) for @rhwp/core when use_rhwp_git=true; leave empty for repository default branch"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: manual-release-${{ inputs.tag_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build and upload release
    runs-on: ubuntu-slim
    timeout-minutes: 15

    env:
      GH_TOKEN: ${{ github.token }}
      npm_config_audit: "false"
      npm_config_fund: "false"
      TAG_NAME: ${{ inputs.tag_name }}
      RELEASE_TITLE: ${{ inputs.release_title }}
      RELEASE_DRAFT: ${{ inputs.draft }}
      RELEASE_PRERELEASE: ${{ inputs.prerelease }}
      USE_RHWP_GIT: ${{ inputs.use_rhwp_git }}
      RHWP_GIT_REPO: ${{ inputs.rhwp_git_repo }}
      RHWP_GIT_REF: ${{ inputs.rhwp_git_ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Set up Rust toolchain for rhwp Git build
        if: env.USE_RHWP_GIT == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack for rhwp Git build
        if: env.USE_RHWP_GIT == 'true'
        shell: bash
        run: cargo install wasm-pack --locked

      - name: Optionally install @rhwp/core from GitHub
        if: env.USE_RHWP_GIT == 'true'
        shell: bash
        run: |
          set -euo pipefail
          repo="${RHWP_GIT_REPO:-edwardkim/rhwp}"
          ref="${RHWP_GIT_REF:-}"
          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT

          clone_url="https://github.com/${repo}.git"
          echo "Cloning ${clone_url}"
          git clone --depth 1 "$clone_url" "$workdir/rhwp"
          if [ -n "$ref" ]; then
            git -C "$workdir/rhwp" fetch --depth 1 origin "$ref"
            git -C "$workdir/rhwp" checkout --detach FETCH_HEAD
          fi

          if [ ! -x "$workdir/rhwp/scripts/prepare-npm.sh" ]; then
            echo "Could not find scripts/prepare-npm.sh in ${repo}" >&2
            exit 1
          fi

          (
            cd "$workdir/rhwp"
            wasm-pack build --release --target web --out-dir pkg
            bash scripts/prepare-npm.sh
          )
          tarball="$(npm pack "$workdir/rhwp/pkg" --silent)"
          echo "Installing @rhwp/core from tarball ${tarball}"
          npm install --no-save "./${tarball}"
          rm -f "$tarball"

      - name: Type-check
        run: npm run check

      - name: Run unit tests
        run: npm test

      - name: Build production app
        run: npm run html:build

      - name: Build standalone release HTML
        run: npm run html:build:release

      - name: Prepare release asset
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"
          asset_name="hwp-recursive-search-${version}.html"
          asset_path="release/${asset_name}"
          cp release/hwp-search.html "$asset_path"
          {
            echo "asset_name=${asset_name}"
            echo "asset_path=${asset_path}"
          } >> "$GITHUB_OUTPUT"

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<'NOTES'
          Standalone production build for recursive HWP/HWPX search.

          Download the HTML asset and open it directly. The rhwp WASM runtime is embedded, so no sibling files are required.

          This workflow is manual-only and uses the lightweight `ubuntu-slim` runner. It runs the TypeScript check, unit tests, normal production build, and standalone release build before uploading the release asset.

          Optional workflow inputs can replace `@rhwp/core` with a direct GitHub install (owner/repo + optional ref) before building. Use that path when you need unreleased upstream changes such as HWP 3.0 support from the latest rhwp mainline.
          NOTES

      - name: Create or update GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          title="${RELEASE_TITLE:-$TAG_NAME}"
          asset_path="${{ steps.package.outputs.asset_path }}"

          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$asset_path" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            exit 0
          fi

          args=(
            release create "$TAG_NAME"
            "$asset_path"
            --repo "$GITHUB_REPOSITORY"
            --title "$title"
            --notes-file release-notes.md
            --target "$GITHUB_SHA"
          )

          if [ "$RELEASE_DRAFT" = "true" ]; then
            args+=(--draft)
          fi

          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"
