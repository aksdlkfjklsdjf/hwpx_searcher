<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HWP Search</title>
  <script>
    (() => {
          const storageKey = "hwp-search-theme";
          const isTheme = (value) => value === "system" || value === "light" || value === "dark";
          let preference = "system";
          try {
            const urlTheme = new URLSearchParams(window.location.search).get("theme");
            const storedTheme = window.localStorage.getItem(storageKey);
            preference = isTheme(urlTheme) ? urlTheme : isTheme(storedTheme) ? storedTheme : "system";
          } catch {
            preference = "system";
          }
          const systemTheme = window.matchMedia?.("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          const resolvedTheme = preference === "system" ? systemTheme : preference;
          document.documentElement.dataset.theme = resolvedTheme;
          document.documentElement.dataset.themePreference = preference;
          document.documentElement.style.colorScheme = resolvedTheme;
        })();
  </script>
  <style>
    :root {
          color-scheme: light;
          --bg: #dfe5ed;
          --chrome: #edf1f6;
          --rail: #f7f9fc;
          --panel: #ffffff;
          --control-bg: #ffffff;
          --control-text: #1d2329;
          --text: #1d2329;
          --muted: #58616b;
          --line: #c8d0da;
          --line-strong: #aeb8c5;
          --accent: #2563eb;
          --accent-strong: #1d4ed8;
          --teal: #0f766e;
          --amber: #a16207;
          --busy: #c79028;
          --busy-text: #8a5a00;
          --danger: #b42318;
          --soft: #eef2f6;
          --mark: #fff2a8;
          --mark-text: inherit;
          --row: #fbfcfe;
          --row-hover: #eef6ff;
          --menu-bg: #f8fafc;
          --section-heading: #354052;
          --panel-head: #f8fafc;
          --page-bg: #e9edf3;
          --page-surface: #ffffff;
          --document-filter: none;
          --page-row-bg: #ffffff;
          --page-row-border: #dbe3ee;
          --page-row-active-bg: #eff6ff;
          --page-row-active-border: #bfdbfe;
          --detail-bg: #f8fbff;
          --detail-border: #bfdbfe;
          --focus: rgba(37, 99, 235, 0.22);
          --window-shadow: 0 12px 28px rgba(30, 41, 59, 0.12);
          --document-shadow: 0 1px 4px rgba(17, 24, 39, 0.18);
        }

        @media (prefers-color-scheme: dark) {
          :root:not([data-theme]) {
            color-scheme: dark;
            --bg: #0b1120;
            --chrome: #111827;
            --rail: #0f172a;
            --panel: #182235;
            --control-bg: #0f172a;
            --control-text: #e5e7eb;
            --text: #e5e7eb;
            --muted: #9aa7b8;
            --line: #334155;
            --line-strong: #475569;
            --accent: #60a5fa;
            --accent-strong: #93c5fd;
            --teal: #5eead4;
            --amber: #fbbf24;
            --busy: #d97706;
            --busy-text: #fbbf24;
            --danger: #f87171;
            --soft: #1f2937;
            --mark: #7c5f00;
            --mark-text: #f8fafc;
            --row: #111827;
            --row-hover: #17233a;
            --menu-bg: #121a29;
            --section-heading: #cbd5e1;
            --panel-head: #121a29;
            --page-bg: #0b1120;
            --page-surface: #ffffff;
            --document-filter: invert(1) hue-rotate(180deg);
            --page-row-bg: #111827;
            --page-row-border: #334155;
            --page-row-active-bg: #172a46;
            --page-row-active-border: #3b82f6;
            --detail-bg: #0f1b2d;
            --detail-border: #3b82f6;
            --focus: rgba(96, 165, 250, 0.34);
            --window-shadow: 0 16px 34px rgba(0, 0, 0, 0.38);
            --document-shadow: 0 1px 8px rgba(0, 0, 0, 0.34);
          }
        }

        :root[data-theme="dark"] {
          color-scheme: dark;
          --bg: #0b1120;
          --chrome: #111827;
          --rail: #0f172a;
          --panel: #182235;
          --control-bg: #0f172a;
          --control-text: #e5e7eb;
          --text: #e5e7eb;
          --muted: #9aa7b8;
          --line: #334155;
          --line-strong: #475569;
          --accent: #60a5fa;
          --accent-strong: #93c5fd;
          --teal: #5eead4;
          --amber: #fbbf24;
          --busy: #d97706;
          --busy-text: #fbbf24;
          --danger: #f87171;
          --soft: #1f2937;
          --mark: #7c5f00;
          --mark-text: #f8fafc;
          --row: #111827;
          --row-hover: #17233a;
          --menu-bg: #121a29;
          --section-heading: #cbd5e1;
          --panel-head: #121a29;
          --page-bg: #0b1120;
          --page-surface: #ffffff;
          --document-filter: invert(1) hue-rotate(180deg);
          --page-row-bg: #111827;
          --page-row-border: #334155;
          --page-row-active-bg: #172a46;
          --page-row-active-border: #3b82f6;
          --detail-bg: #0f1b2d;
          --detail-border: #3b82f6;
          --focus: rgba(96, 165, 250, 0.34);
          --window-shadow: 0 16px 34px rgba(0, 0, 0, 0.38);
          --document-shadow: 0 1px 8px rgba(0, 0, 0, 0.34);
        }

        * {
          box-sizing: border-box;
        }

        [hidden] {
          display: none !important;
        }

        body {
          margin: 0;
          min-height: 100vh;
          background: var(--bg);
          color: var(--text);
          font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          letter-spacing: 0;
        }

        main {
          width: min(1440px, calc(100% - 28px));
          margin: 0 auto;
          padding: 14px 0;
        }

        .app-window {
          position: relative;
          min-height: calc(100vh - 28px);
          border: 1px solid var(--line-strong);
          background: var(--panel);
          box-shadow: var(--window-shadow);
        }

        header.titlebar {
          display: flex;
          justify-content: space-between;
          gap: 20px;
          align-items: center;
          min-height: 52px;
          padding: 10px 14px;
          border-bottom: 1px solid var(--line);
          background: var(--chrome);
        }

        h1 {
          margin: 0;
          font-size: 20px;
          line-height: 1.2;
          font-weight: 760;
        }

        .subhead {
          display: flex;
          gap: 10px;
          align-items: center;
          margin-top: 4px;
          color: var(--muted);
          font-size: 13px;
        }

        .source-count {
          color: var(--teal);
          font-weight: 700;
        }

        .title-actions {
          display: flex;
          align-items: center;
          gap: 8px;
        }

        .language-select {
          width: auto;
          min-width: 136px;
        }

        .theme-button {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
          min-width: 136px;
          border-color: var(--line-strong);
          background: var(--control-bg);
          color: var(--control-text);
          box-shadow: inset 0 1px 2px var(--shadow);
          overflow: hidden;
        }

        .theme-button:hover {
          border-color: var(--accent);
          background: color-mix(in srgb, var(--control-bg) 82%, var(--accent));
        }

        .theme-button-glyph {
          position: relative;
          width: 18px;
          height: 18px;
          border: 2px solid currentColor;
          border-radius: 50%;
          flex: 0 0 auto;
          transition: transform 180ms ease, background 180ms ease, box-shadow 180ms ease;
        }

        .theme-button[data-theme-preference="system"] .theme-button-glyph {
          background: linear-gradient(90deg, currentColor 50%, transparent 50%);
          box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
        }

        .theme-button[data-theme-preference="light"] .theme-button-glyph {
          background: currentColor;
          box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
        }

        .theme-button[data-theme-preference="dark"] .theme-button-glyph {
          background: transparent;
          box-shadow: inset 6px 0 0 currentColor, 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
          transform: rotate(-24deg);
        }

        .theme-button-label {
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .status {
          min-width: 150px;
          padding: 7px 10px;
          border: 1px solid var(--line-strong);
          background: var(--panel);
          font-size: 12px;
          text-align: right;
          font-weight: 700;
        }

        .status[data-state="busy"] {
          border-color: var(--busy);
          color: var(--busy-text);
        }

        .status[data-state="error"] {
          border-color: var(--danger);
          color: var(--danger);
        }

        .search-strip {
          display: grid;
          grid-template-columns: minmax(260px, 1fr) auto auto;
          gap: 8px;
          align-items: center;
          padding: 10px 14px;
          border-bottom: 1px solid var(--line);
          background: var(--chrome);
        }

        input[type="search"], select, button {
          height: 34px;
          border: 1px solid var(--line);
          background: var(--control-bg);
          color: var(--control-text);
          font: inherit;
          font-size: 13px;
          padding: 0 10px;
          border-radius: 3px;
          min-width: 0;
        }

        input[type="search"], select {
          width: 100%;
        }

        button {
          border-color: var(--accent);
          background: var(--accent);
          color: #fff;
          cursor: pointer;
          font-weight: 720;
          padding: 0 14px;
        }

        button:disabled {
          cursor: wait;
          opacity: 0.65;
        }

        input:focus, select:focus, button:focus-visible, .file-button:focus-within {
          outline: 2px solid var(--focus);
          outline-offset: 1px;
        }

        .visually-hidden-select {
          position: absolute;
          inline-size: 1px;
          block-size: 1px;
          opacity: 0;
          pointer-events: none;
        }

        label {
          display: inline-flex;
          align-items: center;
          gap: 7px;
          color: var(--muted);
          font-size: 13px;
          white-space: nowrap;
        }

        .workspace {
          display: grid;
          grid-template-columns: 270px minmax(0, 1fr);
          min-height: calc(100vh - 94px);
        }

        .filter-panel {
          border-right: 1px solid var(--line);
          background: var(--rail);
          min-width: 0;
        }

        .filter-group {
          padding: 12px;
          border-bottom: 1px solid var(--line);
        }

        .filter-group h2 {
          margin: 0 0 10px;
          font-size: 12px;
          line-height: 1.2;
          color: var(--section-heading);
          text-transform: uppercase;
          font-weight: 760;
        }

        .field-label {
          display: block;
          margin: 10px 0 5px;
          color: var(--muted);
          font-size: 12px;
        }

        .check-row {
          display: flex;
          min-height: 28px;
          align-items: center;
          color: var(--text);
        }

        .segmented-slider {
          position: relative;
          display: grid;
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 0;
          height: 38px;
          padding: 3px;
          border: 1px solid var(--line);
          border-radius: 6px;
          background: color-mix(in srgb, var(--control-bg) 82%, var(--panel));
          box-shadow: inset 0 1px 2px var(--shadow);
          overflow: hidden;
        }

        .segmented-slider-thumb {
          position: absolute;
          inset-block: 3px;
          inset-inline-start: 3px;
          width: calc((100% - 6px) / 3);
          border: 1px solid color-mix(in srgb, var(--accent) 55%, var(--line));
          border-radius: 4px;
          background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 88%, white), var(--accent));
          box-shadow: 0 7px 18px var(--shadow);
          transition: transform 180ms ease;
          z-index: 0;
        }

        .segmented-slider[data-value="file"] .segmented-slider-thumb {
          transform: translateX(0);
        }

        .segmented-slider[data-value="page"] .segmented-slider-thumb {
          transform: translateX(100%);
        }

        .segmented-slider[data-value="detail"] .segmented-slider-thumb {
          transform: translateX(200%);
        }

        .segmented-slider-option {
          position: relative;
          z-index: 1;
          height: 30px;
          border: 0;
          border-radius: 4px;
          background: transparent;
          color: var(--muted);
          font-size: 12px;
          font-weight: 760;
          padding: 0 6px;
          transition: color 160ms ease;
        }

        .segmented-slider-option[aria-checked="true"] {
          color: #fff;
        }

        .segmented-slider-option:focus-visible {
          outline-offset: -2px;
        }

        .file-controls {
          display: grid;
          grid-template-columns: 1fr;
          gap: 8px;
          align-items: center;
          min-width: 0;
        }

        .file-input {
          position: absolute;
          inline-size: 1px;
          block-size: 1px;
          opacity: 0;
          pointer-events: none;
        }

        .file-button {
          height: 34px;
          justify-content: center;
          border: 1px solid var(--accent);
          border-radius: 3px;
          background: var(--accent);
          color: white;
          cursor: pointer;
          font-size: 13px;
          font-weight: 720;
          padding: 0 12px;
        }

        .file-button:focus-within, .file-button:hover {
          background: var(--accent-strong);
          border-color: var(--accent-strong);
        }

        .file-state {
          color: var(--muted);
          font-size: 12px;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .metrics {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 8px;
        }

        .metric {
          border: 1px solid var(--line);
          background: var(--panel);
          padding: 8px 9px;
          min-width: 0;
        }

        .metric-button {
          height: auto;
          display: block;
          width: 100%;
          color: var(--text);
          text-align: left;
          cursor: pointer;
        }

        .metric-button:not(:disabled):hover {
          border-color: var(--danger);
          background: color-mix(in srgb, var(--panel) 86%, var(--danger));
        }

        .metric-button:disabled {
          cursor: default;
          opacity: 1;
        }

        .metric-label {
          display: block;
          color: var(--muted);
          font-size: 12px;
          margin-bottom: 4px;
        }

        .metric-value {
          display: block;
          font-size: 18px;
          line-height: 1;
          font-weight: 780;
        }

        .error-details {
          margin-top: 10px;
          border: 1px solid var(--danger);
          background: color-mix(in srgb, var(--panel) 92%, var(--danger));
          padding: 9px;
          max-height: 180px;
          overflow: auto;
        }

        .error-detail-item + .error-detail-item {
          margin-top: 9px;
          padding-top: 9px;
          border-top: 1px solid var(--line);
        }

        .error-detail-path, .error-detail-message {
          display: block;
          overflow-wrap: anywhere;
          font-size: 12px;
          line-height: 1.35;
        }

        .error-detail-path {
          color: var(--text);
          font-weight: 760;
          margin-bottom: 4px;
        }

        .error-detail-message {
          color: var(--danger);
          font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }

        .results-pane {
          background: var(--panel);
          min-width: 0;
        }

        .results-pane {
          min-width: 0;
        }

        .panel-head {
          display: flex;
          justify-content: space-between;
          gap: 12px;
          align-items: center;
          min-height: 44px;
          padding: 10px 12px;
          border-bottom: 1px solid var(--line);
          background: var(--panel-head);
        }

        h2 {
          margin: 0;
          font-size: 14px;
          line-height: 1.2;
        }

        .summary {
          color: var(--muted);
          font-size: 12px;
          text-align: right;
        }

        .file-detail-header {
          display: grid;
          grid-template-columns: 18px minmax(120px, 1fr) minmax(64px, 0.34fr) minmax(84px, 0.42fr) minmax(58px, 0.28fr) minmax(54px, 0.24fr);
          gap: 6px;
          align-items: center;
          padding: 0 12px;
          border-bottom: 1px solid var(--line);
          background: var(--chrome);
          overflow: hidden;
        }

        .file-detail-header::before {
          content: "";
          grid-column: 1;
        }

        .file-detail-heading {
          height: 30px;
          justify-content: flex-start;
          gap: 4px;
          min-width: 0;
          border: 0;
          border-radius: 0;
          background: transparent;
          color: var(--muted);
          font-size: 12px;
          font-weight: 760;
          padding: 0;
          text-align: left;
        }

        .file-detail-heading span:first-child {
          min-width: 0;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .file-detail-heading:hover, .file-detail-heading:focus-visible {
          color: var(--text);
          background: transparent;
          outline-offset: -2px;
        }

        .file-detail-heading-name {
          grid-column: 2;
        }

        .sort-indicator {
          color: var(--accent-strong);
          min-width: 10px;
        }

        .result-list {
          display: grid;
          gap: 0;
          max-height: calc(100vh - 140px);
          overflow-y: auto;
          overflow-x: hidden;
        }

        .result-card {
          border: 0;
          border-bottom: 1px solid var(--line);
          padding: 0;
          background: var(--row);
        }

        .result-card:hover {
          background: var(--row-hover);
        }

        .result-title {
          display: grid;
          grid-template-columns: 18px minmax(120px, 1fr) minmax(64px, 0.34fr) minmax(84px, 0.42fr) minmax(58px, 0.28fr) minmax(54px, 0.24fr);
          align-items: center;
          gap: 6px;
          width: 100%;
          height: auto;
          min-height: 42px;
          margin: 0;
          padding: 10px 12px;
          border: 0;
          border-radius: 0;
          background: transparent;
          color: inherit;
          cursor: pointer;
          font-size: 13px;
          font-weight: 700;
          text-align: left;
        }

        .queued-file-row {
          cursor: default;
        }

        .result-title:hover, .result-title:focus-visible {
          background: var(--row-hover);
          outline: none;
        }

        .queued-file-row:hover {
          background: transparent;
        }

        .result-disclosure {
          width: 18px;
          color: var(--accent-strong);
          font-size: 16px;
          line-height: 1;
          text-align: center;
        }

        .result-name {
          min-width: 0;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .result-meta {
          color: var(--accent-strong);
          font-size: 12px;
          font-weight: 700;
          min-width: 0;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .result-modified, .result-size, .result-count {
          color: var(--muted);
        }

        .snippet {
          color: var(--muted);
          font-size: 13px;
          line-height: 1.45;
          word-break: break-word;
        }

        .page-match-list {
          display: grid;
          gap: 6px;
          margin-top: 0;
          padding: 0 12px 10px;
        }

        .page-match-row {
          display: grid;
          grid-template-columns: auto auto minmax(0, 1fr);
          gap: 8px;
          align-items: center;
          width: 100%;
          height: auto;
          min-height: 32px;
          padding: 6px 8px;
          border: 1px solid var(--page-row-border);
          border-radius: 3px;
          background: var(--page-row-bg);
          color: inherit;
          text-align: left;
          cursor: pointer;
          font: inherit;
        }

        .page-match-row:hover, .page-match-row:focus-visible, .page-match-row[aria-expanded="true"] {
          border-color: var(--page-row-active-border);
          background: var(--page-row-active-bg);
          outline: none;
        }

        .page-match-page {
          color: var(--accent-strong);
          font-size: 12px;
          font-weight: 760;
          white-space: nowrap;
        }

        .page-match-count {
          color: var(--muted);
          font-size: 12px;
          white-space: nowrap;
        }

        .page-match-hint {
          color: var(--muted);
          font-size: 12px;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .page-match-detail {
          display: grid;
          gap: 6px;
          padding: 0 0 2px 16px;
        }

        .occurrence-row {
          display: grid;
          grid-template-columns: auto minmax(0, 1fr);
          gap: 8px;
          width: 100%;
          height: auto;
          padding: 4px 8px;
          border: 0;
          border-left: 2px solid var(--detail-border);
          border-radius: 0;
          background: var(--detail-bg);
          color: inherit;
          cursor: pointer;
          font: inherit;
          text-align: left;
        }

        .occurrence-row:hover, .occurrence-row:focus-visible {
          background: var(--page-row-active-bg);
          outline: 2px solid var(--focus);
          outline-offset: 1px;
        }

        .occurrence-index {
          color: var(--accent-strong);
          font-size: 12px;
          font-weight: 760;
          white-space: nowrap;
        }

        .occurrence-text {
          color: var(--muted);
          font-size: 13px;
          line-height: 1.45;
          word-break: break-word;
        }

        mark {
          background: var(--mark);
          color: var(--mark-text);
          padding: 0 2px;
        }

        .preview-overlay {
          position: fixed;
          inset: 0;
          z-index: 1000;
          display: grid;
          place-items: center;
          padding: 24px;
          background: rgba(2, 6, 23, 0.62);
        }

        .drop-overlay {
          position: absolute;
          inset: 8px;
          z-index: 100;
          display: grid;
          place-items: center;
          border: 2px dashed var(--accent);
          background: rgba(37, 99, 235, 0.16);
          pointer-events: none;
        }

        .drop-message {
          padding: 12px 18px;
          border: 1px solid var(--line-strong);
          background: var(--panel);
          color: var(--text);
          font-size: 15px;
          font-weight: 760;
          box-shadow: var(--window-shadow);
        }

        .preview-overlay[hidden] {
          display: none;
        }

        .preview-dialog {
          display: grid;
          grid-template-rows: auto minmax(0, 1fr);
          width: min(1120px, 100%);
          max-height: min(900px, calc(100vh - 48px));
          border: 1px solid var(--line-strong);
          background: var(--panel);
          box-shadow: var(--window-shadow);
          min-width: 0;
        }

        .viewer-head {
          display: flex;
          justify-content: space-between;
          align-items: center;
          gap: 12px;
          min-height: 44px;
          padding: 10px 12px;
          border-bottom: 1px solid var(--line);
          background: var(--panel-head);
        }

        .viewer-meta {
          display: grid;
          gap: 3px;
          min-width: 0;
        }

        .viewer-title {
          min-width: 0;
          font-size: 14px;
          font-weight: 740;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .viewer-source {
          color: var(--muted);
          font-size: 12px;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .preview-close {
          width: 34px;
          min-width: 34px;
          padding: 0;
          border-color: var(--line-strong);
          background: var(--control-bg);
          color: var(--control-text);
          font-size: 18px;
          line-height: 1;
        }

        .page {
          min-height: 360px;
          max-height: calc(100vh - 116px);
          overflow: auto;
          padding: 16px;
          background: var(--page-bg);
        }

        progress {
          width: 100%;
          height: 5px;
          display: block;
          border: 0;
          border-radius: 0;
          background: var(--soft);
        }

        progress[hidden] {
          display: none;
        }

        progress::-webkit-progress-bar {
          background: var(--soft);
        }

        progress::-webkit-progress-value {
          background: var(--accent);
        }

        .empty-preview {
          display: grid;
          min-height: 320px;
          place-items: center;
          color: var(--muted);
          font-size: 14px;
          text-align: center;
        }

        .page svg {
          display: block;
          max-width: 100%;
          height: auto;
          margin: 0 auto;
          background: var(--page-surface);
          box-shadow: var(--document-shadow);
          filter: var(--document-filter);
        }

        .hwp-document-highlight {
          animation: documentKeywordPulse 1.25s ease-in-out infinite;
          paint-order: stroke fill;
          transform-box: fill-box;
          transform-origin: center;
          vector-effect: non-scaling-stroke;
        }

        @keyframes documentKeywordPulse {
          0%, 100% {
            fill: #fde047;
            fill-opacity: 0.76;
            stroke: #f43f5e;
            stroke-opacity: 0.96;
            stroke-width: 2.2;
          }

          45% {
            fill: #22d3ee;
            fill-opacity: 0.92;
            stroke: #ec4899;
            stroke-opacity: 1;
            stroke-width: 3;
          }

          70% {
            fill: #a78bfa;
            fill-opacity: 0.88;
            stroke: #06b6d4;
            stroke-opacity: 1;
            stroke-width: 2.6;
          }
        }

        @media (prefers-reduced-motion: reduce) {
          .hwp-document-highlight {
            animation: none;
          }
        }

        .error {
          color: var(--danger);
          white-space: pre-wrap;
          font-size: 13px;
        }

        @media (max-width: 820px) {
          main {
            width: 100%;
            padding: 0;
          }

          .app-window {
            min-height: 100vh;
            border: 0;
            box-shadow: none;
          }

          header.titlebar {
            align-items: flex-start;
            flex-direction: column;
          }

          .title-actions {
            width: 100%;
            align-items: stretch;
            flex-direction: column;
          }

          .theme-button, .language-select, .status {
            width: 100%;
          }

          .status {
            text-align: left;
          }

          .search-strip, .workspace, .metrics {
            grid-template-columns: 1fr;
          }

          .workspace {
            min-height: auto;
          }

          .filter-panel, .results-pane {
            border-right: 0;
          }

          .result-list, .page {
            max-height: none;
            min-height: 360px;
          }

          label {
            justify-content: flex-start;
          }

          button {
            width: 100%;
          }

          .preview-overlay {
            padding: 10px;
          }

          .preview-dialog {
            max-height: calc(100vh - 20px);
          }

          .preview-close {
            width: 34px;
          }
        }

    // search-core.js
    function findTextMatches(text, query, caseSensitive) {
      const needle = caseSensitive ? query : query.toLocaleLowerCase();
      const haystack = caseSensitive ? text : text.toLocaleLowerCase();
      const output = [];
      let index = 0;

      while (index <= haystack.length) {
        const found = haystack.indexOf(needle, index);
        if (found === -1) {
          break;
        }
        output.push({
          index: found,
          length: query.length,
          snippet: makeSnippet(text, found, query.length),
        });
        index = found + Math.max(needle.length, 1);
      }

      return output;
    }

    function makeSnippet(text, index, length) {
      const radius = 64;
      const start = Math.max(0, index - radius);
      const end = Math.min(text.length, index + length + radius);
      const prefix = start > 0 ? "..." : "";
      const suffix = end < text.length ? "..." : "";
      return `${prefix}${text.slice(start, end).replace(/\s+/g, " ").trim()}${suffix}`;
    }

    function extractPageText(doc, page) {
      return extractTextFromLayout(parsePageTextLayout(doc.getPageTextLayout(page)));
    }

    function extractTextFromLayout(layout) {
      return (layout.runs || [])
        .map((run) => typeof run.text === "string" ? run.text : "")
        .join("")
        .replace(/\uFFFC/g, " ")
        .replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F]/g, "");
    }

    function parsePageTextLayout(raw) {
      try {
        return JSON.parse(raw);
      } catch (error) {
        if (!isControlCharacterJsonError(error)) {
          throw error;
        }
        return JSON.parse(escapeRawControlCharactersInJsonStrings(raw));
      }
    }

    function isControlCharacterJsonError(error) {
      return error instanceof SyntaxError && /control character/i.test(error.message);
    }

    function escapeRawControlCharactersInJsonStrings(raw) {
      let output = "";
      let inString = false;
      let escaped = false;

      for (let index = 0; index < raw.length; index += 1) {
        const char = raw[index];
        const code = char.charCodeAt(0);

        if (!inString) {
          output += char;
          if (char === '"') {
            inString = true;
          }
          continue;
        }

        if (escaped) {
          output += char;
          escaped = false;
        } else if (char === "\\") {
          output += char;
          escaped = true;
        } else if (char === '"') {
          output += char;
          inString = false;
        } else if (code <= 0x1f) {
          output += "\\u" + code.toString(16).padStart(4, "0");
        } else {
          output += char;
        }
      }

      return output;
    }

    function normalizeRunTextWithMap(text) {
      let normalized = "";
      const map = [];
      for (let index = 0; index < text.length; index += 1) {
        const char = text[index];
        if (/[\u0000-\u0008\u000B\u000C\u000E-\u001F]/.test(char)) {
          continue;
        }
        normalized += char === "\uFFFC" ? " " : char;
        map.push(index);
      }
      return { text: normalized, map };
    }

    function base64ToBytes(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      return bytes;
    }

    // wasm-loader.js
    const WasmLoader = (() => {
      const fallbackGlobal = "__HWP_SEARCH_RHWP_WASM_BASE64__";

      async function loadRhwpWasmBytes(payload) {
        let primaryError = null;

        if (payload.rhwpWasmUrl) {
          try {
            const response = await fetch(new URL(payload.rhwpWasmUrl, document.baseURI));
            if (!response.ok) {
              throw new Error("HTTP " + response.status + " while loading " + payload.rhwpWasmUrl);
            }
            return {
              bytes: new Uint8Array(await response.arrayBuffer()),
              source: "wasm-file",
            };
          } catch (error) {
            primaryError = error;
          }
        }

        if (payload.rhwpWasmFallbackUrl) {
          try {
            await loadScript(new URL(payload.rhwpWasmFallbackUrl, document.baseURI).href);
            const base64 = globalThis[fallbackGlobal];
            if (typeof base64 !== "string" || base64.length === 0) {
              throw new Error("WASM fallback script did not expose " + fallbackGlobal);
            }
            return {
              bytes: base64ToBytes(base64),
              source: "wasm-fallback-script",
            };
          } catch (fallbackError) {
            throw new Error("Could not load rhwp WASM. Primary: " + errorMessage(primaryError) + ". Fallback: " + errorMessage(fallbackError));
          }
        }

        if (payload.rhwpWasmBase64) {
          return {
            bytes: base64ToBytes(payload.rhwpWasmBase64),
            source: "embedded-base64",
          };
        }

        throw new Error("Missing rhwp WASM asset configuration" + (primaryError ? ": " + errorMessage(primaryError) : ""));
      }

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.async = true;
          script.addEventListener("load", () => resolve());
          script.addEventListener("error", () => reject(new Error("Failed to load " + src)));
          document.head.append(script);
        });
      }

      function errorMessage(error) {
        return error instanceof Error ? error.message : String(error ?? "none");
      }

      return { loadRhwpWasmBytes };
    })();

    // worker-client.js
    const SearchWorkerClient = (() => {
      function create({ workerUrl, rhwpJs, rhwpWasmBytes }) {
        const worker = new Worker(workerUrl);
        let nextMessageId = 0;
        const pending = new Map();

        const ready = new Promise((resolve, reject) => {
          pending.set(0, { resolve, reject });
        });

        worker.addEventListener("message", (event) => {
          const message = event.data || {};
          if (message.type === "ready") {
            pending.get(0)?.resolve();
            pending.delete(0);
            return;
          }
          if (message.type === "init-error") {
            pending.get(0)?.reject(new Error(message.error || "Worker initialization failed"));
            pending.delete(0);
            return;
          }

          const callbacks = pending.get(message.id);
          if (!callbacks) {
            return;
          }
          pending.delete(message.id);
          if (message.type === "error") {
            callbacks.reject(new Error(message.error || "Worker task failed"));
          } else {
            callbacks.resolve(message.result);
          }
        });

        worker.addEventListener("error", (event) => {
          const detail = [
            event.message || "Worker error",
            event.filename,
            event.lineno ? "line " + event.lineno : "",
            event.colno ? "column " + event.colno : "",
          ].filter(Boolean).join(" · ");
          for (const callbacks of pending.values()) {
            callbacks.reject(new Error(detail));
          }
          pending.clear();
        });

        worker.postMessage({
          type: "init",
          rhwpJs,
          rhwpWasmBytes,
        });

        return {
          ready,
          search(task, transfer) {
            const id = ++nextMessageId;
            worker.postMessage({ type: "search", id, task }, transfer);
            return new Promise((resolve, reject) => {
              pending.set(id, { resolve, reject });
            });
          },
          terminate() {
            worker.terminate();
          },
        };
      }

      return { create };
    })();

    // file-index.js
    function filesFromTestItems(items) {
      return items.map((item) => ({
        name: item.name,
        webkitRelativePath: item.relativePath || item.name,
        size: item.size ?? Math.floor((item.base64?.length || 0) * 3 / 4),
        lastModified: item.lastModified ?? 0,
        arrayBuffer: async () => base64ToBytes(item.base64).buffer,
      }));
    }

    async function loadSelectedFiles(files) {
      const hwpFiles = files
        .filter(isHwpLikeFile)
        .sort((a, b) => filePathOf(a).localeCompare(filePathOf(b)));

      state.localDocuments = [];
      state.scanErrors = [];
      state.searchResults = [];
      state.preview = null;
      state.scanned = 0;
      state.totalMatches = 0;

      if (hwpFiles.length === 0) {
        fileStateEl.textContent = t("index.noHwpFiles");
        syncDocuments();
        renderPreview();
        renderIdleSummary();
        updateReadyState();
        return;
      }

      state.localDocuments = hwpFiles.map((file) => ({
        id: "folder:" + filePathOf(file),
        name: file.name,
        label: filePathOf(file),
        format: extensionOf(file.name).toUpperCase(),
        path: filePathOf(file),
        repoPath: filePathOf(file),
        source: "folder",
        size: file.size ?? 0,
        lastModified: file.lastModified ?? 0,
        getBytes: async () => new Uint8Array(await file.arrayBuffer()),
      }));

      syncDocuments();
      setStatus("ready");
      fileStateEl.textContent = t("summary.queued", { count: state.localDocuments.length });

      renderIdleSummary();

    function handleDragEnter(event) {
      if (!isFileDrag(event)) {
        return;
      }
      event.preventDefault();
      state.dragDepth += 1;
      showDropOverlay(true);

    function handleDragOver(event) {

      }
      event.preventDefault();
      if (event.dataTransfer) {

    function handleDragLeave(event) {

        return;
      }
      event.preventDefault();
      state.dragDepth = Math.max(0, state.dragDepth - 1);
      if (state.dragDepth === 0) {
        showDropOverlay(false);
      }
    }

    async function handleDrop(event) {
      if (!isFileDrag(event)) {
        return;
      }
      event.preventDefault();
      state.dragDepth = 0;
      showDropOverlay(false);
      await loadDroppedDataTransfer(event.dataTransfer);
    }

    function isFileDrag(event) {
      const types = Array.from(event.dataTransfer?.types || []);
      return types.includes("Files") || (event.dataTransfer?.files?.length ?? 0) > 0;
    }

    function showDropOverlay(active) {

    async function loadDroppedDataTransfer(dataTransfer) {
      try {
        setStatus("indexing", "busy");
        const files = await collectDroppedFiles(dataTransfer);
        await loadSelectedFiles(files);
      } catch (error) {
        state.scanErrors = [{
          path: "drag-drop",
          error: error instanceof Error ? error.message : String(error),
        }];
        fileStateEl.textContent = t("index.dropFailed");
        setStatus("error", "error");
        renderMetrics();
        updateReadyState();
      }
    }

    async function collectDroppedFiles(dataTransfer) {
      const items = Array.from(dataTransfer?.items || []);
      const entryItems = items
        .map((item) => typeof item.webkitGetAsEntry === "function" ? item.webkitGetAsEntry() : null)
        .filter(Boolean);

      if (entryItems.length > 0) {
        const files = [];
        for (const entry of entryItems) {
          await collectEntryFiles(entry, "", files);
        }
        if (files.length > 0) {
          return files;
        }
      }

      const itemFiles = items
        .map((item) => item.kind === "file" && typeof item.getAsFile === "function" ? item.getAsFile() : null)
        .filter(Boolean);
      if (itemFiles.length > 0) {
        return itemFiles;
      }

      return Array.from(dataTransfer?.files || []);
    }

    async function collectEntryFiles(entry, prefix, output) {
      if (entry.isFile) {
        await new Promise((resolve, reject) => {
          entry.file((file) => {
            output.push(fileWithRelativePath(file, prefix + file.name));
            resolve();
          }, reject);
        });
        return;
      }

      if (!entry.isDirectory) {
        return;
      }

      const reader = entry.createReader();
      const directoryPrefix = prefix + entry.name + "/";
      while (true) {
        const entries = await readDirectoryEntries(reader);
        if (entries.length === 0) {
          break;
        }
        for (const child of entries) {
          await collectEntryFiles(child, directoryPrefix, output);
        }
      }
    }

    function readDirectoryEntries(reader) {
      return new Promise((resolve, reject) => {
        reader.readEntries(resolve, reject);
      });
    }

    function fileWithRelativePath(file, relativePath) {
      if (!relativePath) {
        return file;
      }
      return {
        name: file.name,
        size: file.size,
        lastModified: file.lastModified,
        webkitRelativePath: relativePath,
        arrayBuffer: () => file.arrayBuffer(),
      };
    }

    function isHwpLikeFile(file) {
      const ext = extensionOf(file.name || filePathOf(file));
      return ext === "hwp" || ext === "hwpx";
    }

    function filePathOf(file) {
      return file.webkitRelativePath || file.name || "untitled";
    }

    function extensionOf(fileName) {
      const lastDot = fileName.lastIndexOf(".");
      return lastDot >= 0 ? fileName.slice(lastDot + 1).toLocaleLowerCase() : "";
    }

    // results-view.js
    function renderResultList(query, caseSensitive) {

          hint.textContent = t("result.showDetails");

          const detail = document.createElement("div");
          detail.className = "page-match-detail";
          detail.hidden = true;

          row.addEventListener("click", (event) => {
            event.stopPropagation();
            togglePageDetails(row, detail, hint, pageGroup, item, query, caseSensitive);
          });

          row.append(page, count, hint);
          pageList.append(row, detail);
          if (detailsOpen) {
            setPageDetailsOpen(row, detail, hint, pageGroup, item, query, caseSensitive, true);
          }
        }

        card.append(title, pageList);
        resultsEl.append(card);
      }
    }

    function renderQueuedFileList() {
      resultsEl.textContent = "";
      for (const item of state.documents) {
        const card = document.createElement("article");
        card.className = "result-card queued-file-card";

        const row = document.createElement("div");
        row.className = "result-title queued-file-row";

        const spacer = document.createElement("span");
        spacer.className = "result-disclosure";
        spacer.setAttribute("aria-hidden", "true");

        const name = document.createElement("span");
        name.className = "result-name";
        name.textContent = displayFileName(item);
        name.title = item.path || item.name;

        row.append(
          spacer,
          name,
          metadataCell(displayResultFormat(item), "result-type"),
          metadataCell(formatModifiedDate(item.lastModified), "result-modified"),
          metadataCell(formatFileSize(item.size), "result-size"),
          metadataCell("", "result-count"),
        );
        card.append(row);
        resultsEl.append(card);
      }
    }

    function currentGroupLevel() {
      return Object.values(GROUP_LEVEL).includes(groupLevelEl.value) ? groupLevelEl.value : GROUP_LEVEL.page;
    }

    function groupOccurrencesByPage(occurrences) {
      const grouped = new Map();
      for (const occurrence of occurrences) {
        if (!grouped.has(occurrence.page)) {
          grouped.set(occurrence.page, []);
        }
        grouped.get(occurrence.page).push(occurrence);
      }
      return [...grouped.entries()].map(([page, items]) => ({ page, items }));
    }

    function togglePageDetails(row, detail, hint, pageGroup, item, query, caseSensitive) {
      setPageDetailsOpen(row, detail, hint, pageGroup, item, query, caseSensitive, detail.hidden);

    function setPageDetailsOpen(row, detail, hint, pageGroup, item, query, caseSensitive, shouldOpen) {
      row.setAttribute("aria-expanded", String(shouldOpen));

    function displayResultFormat(item) {
      if (item.source === "folder") {
        return t("result.localFormat", { format: item.rawFormat || item.format.replace(/\s+·\s+local$/, "") });
      }
      return item.format;
    }

    function displayFileName(item) {
      const value = String(item.name || item.path || "");
      const normalized = value.replace(/\\/g, "/");
      return normalized.slice(normalized.lastIndexOf("/") + 1) || value;
    }

    function metadataCell(text, className) {
      const cell = document.createElement("span");
      cell.className = "result-meta " + className;
      cell.textContent = text;
      return cell;
    }

    function formatFileSize(size) {
      const bytes = Number(size);
      if (!Number.isFinite(bytes) || bytes <= 0) {
        return "";
      }
      if (bytes < 1024) {
        return Math.round(bytes) + " B";
      }
      if (bytes < 1024 * 1024) {
        return Math.round(bytes / 1024) + " KB";
      }
      return (bytes / 1024 / 1024).toFixed(bytes < 10 * 1024 * 1024 ? 1 : 0) + " MB";
    }

    function formatModifiedDate(lastModified) {
      const timestamp = Number(lastModified);
      if (!Number.isFinite(timestamp) || timestamp <= 0) {
        return "";
      }
      return new Date(timestamp).toLocaleDateString(I18n.getLanguage(), {
        year: "numeric",
        month: "short",
        day: "numeric",
      });
    }

    function highlight(text, query, caseSensitive) {
      const escapedText = escapeHtml(text);
      const escapedQuery = escapeRegExp(escapeHtml(query));
      const flags = caseSensitive ? "g" : "gi";
      return escapedText.replace(new RegExp(escapedQuery, flags), (match) => `<mark>${match}</mark>`);
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[char]));
    }

    function escapeRegExp(value) {
      return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    // preview-view.js
    function renderPreview() {
      if (state.preview) {
        previewOverlayEl.hidden = false;
        viewerTitleEl.textContent = previewTitle(state.preview);
        viewerSourceEl.textContent = state.preview.source;
        pageEl.innerHTML = state.preview.svg;
        return;
      }

      previewOverlayEl.hidden = true;
      viewerTitleEl.textContent = t("preview.title");
      viewerSourceEl.textContent = "";
      pageEl.textContent = "";
    }

    function closePreview() {
      state.preview = null;
      renderPreview();
      if (window.__HWP_SINGLE_HTML_READY__) {
        updateReadyState();
      }
    }

    async function showResultPreview(item, pageIndex = item.previewPage) {
      const targetPage = Number.isFinite(pageIndex) ? pageIndex : item.previewPage;

      if (item.previewByPage?.[targetPage]) {
        state.preview = item.previewByPage[targetPage];
        renderPreview();
        return;
      }

      const descriptor = state.documents[item.documentIndex];
      if (!descriptor || targetPage < 0) {
        state.preview = null;
        renderPreview();
        return;
      }

      setStatus("preview", "busy");
      try {
        const bytes = await descriptor.getBytes();
        const doc = new state.rhwp.HwpDocument(bytes);
        try {
          const pageOccurrences = item.occurrences.filter((occurrence) => occurrence.page === targetPage + 1);
          const preview = {
            documentIndex: item.documentIndex,
            label: descriptor.label,
            page: targetPage + 1,
            pages: item.pages,
            source: descriptor.source === "folder" ? descriptor.path : descriptor.repoPath,
            svg: renderHighlightedPageSvg(doc, targetPage, item.query || searchEl.value, item.caseSensitive ?? caseEl.checked, pageOccurrences),
          };
          item.previewByPage ||= {};
          item.previewByPage[targetPage] = preview;
          state.preview = preview;
          renderPreview();
        } finally {
          doc.free();
        }
      } catch (error) {
        state.scanErrors.push({
          path: descriptor.path,
          error: error instanceof Error ? error.message : String(error),
        });
        renderMetrics();
      } finally {
        setStatus("ready");
      }
    }

    function previewTitle(preview) {
      if (preview.label && Number.isFinite(preview.page) && Number.isFinite(preview.pages)) {
        return t("preview.pageTitle", {
          label: preview.label,
          page: preview.page,
          pages: preview.pages,
        });
      }
      return preview.title || t("preview.title");
    }

    function renderHighlightedPageSvg(doc, page, query, caseSensitive, occurrences = []) {
      const svg = doc.renderPageSvg(page);
      const rects = buildDocumentHighlightRects(doc, page, query, caseSensitive, occurrences);
      if (rects.length === 0) {
        return svg;
      }

      const highlightLayer = '<g class="hwp-document-highlights" pointer-events="none">' + rects.map((rect) =>
        '<rect class="hwp-document-highlight" x="' + formatSvgNumber(rect.x) + '" y="' + formatSvgNumber(rect.y) + '" width="' + formatSvgNumber(rect.width) + '" height="' + formatSvgNumber(rect.height) + '" rx="' + formatSvgNumber(Math.min(3, rect.height * 0.18)) + '" fill="#fde047" fill-opacity="0.78" stroke="#f43f5e" stroke-opacity="0.95" stroke-width="2.2" vector-effect="non-scaling-stroke"/>'
      ).join("") + "</g>";
      const insertAt = svg.lastIndexOf("</svg>");
      if (insertAt === -1) {
        const openingEnd = svg.indexOf(">");
        return openingEnd === -1 ? svg : svg.slice(0, openingEnd + 1) + highlightLayer + svg.slice(openingEnd + 1);
      }
      return svg.slice(0, insertAt) + highlightLayer + svg.slice(insertAt);
    }

    function buildDocumentHighlightRects(doc, page, query, caseSensitive, occurrences = []) {
      if (!query) {
        return [];
      }

      const layout = parsePageTextLayout(doc.getPageTextLayout(page));
      const rawRunInfos = [];
      let textStart = 0;
      for (const run of layout.runs || []) {
        if (typeof run.text !== "string") {
          continue;
        }
        const normalized = normalizeRunTextWithMap(run.text);
        if (!normalized.text) {
          continue;
        }
        rawRunInfos.push({
          run,
          text: normalized.text,
          map: normalized.map,
          textStart,
        });
        textStart += normalized.text.length;
      }

      const occurrenceMatches = occurrences
        .filter((occurrence) => Number.isFinite(Number(occurrence.index)))
        .map((occurrence) => ({
          index: Number(occurrence.index),
          length: Math.max(1, Number(occurrence.length) || query.length),
        }));

      if (occurrenceMatches.length > 0) {
        const runInfos = rawRunInfos.map((info) => ({
          ...info,
          start: info.textStart,
        }));
        return rectsForMatches(runInfos, occurrenceMatches);
      }

      let fullText = "";
      const fallbackRunInfos = rawRunInfos.map((info) => {
        const start = fullText.length;
        fullText += info.text;
        return { ...info, start };
      });
      const matches = findTextMatches(fullText, query, caseSensitive).map((match) => ({
        index: match.index,
        length: match.length,
      }));
      return rectsForMatches(fallbackRunInfos, matches);
    }

    function rectsForMatches(runInfos, matches) {
      const rects = [];
      for (const match of matches) {
        const start = match.index;
        const end = match.index + match.length;
        for (const info of runInfos) {
          const runStart = info.start;
          const runEnd = info.start + info.text.length;
          if (end <= runStart || start >= runEnd) {
            continue;
          }

          const cleanStart = Math.max(start - runStart, 0);
          const cleanEnd = Math.min(end - runStart, info.text.length);
          const originalStart = info.map[cleanStart] ?? cleanStart;
          const originalEnd = (info.map[cleanEnd - 1] ?? cleanEnd - 1) + 1;
          const rect = rectForRunRange(info.run, originalStart, originalEnd);
          if (rect) {
            rects.push(rect);
          }
        }
      }
      return rects;
    }

    function rectForRunRange(run, start, end) {
      const x = numberOr(run.x, 0);
      const y = numberOr(run.y, 0);
      const width = numberOr(run.w, 0);
      const height = Math.max(numberOr(run.h, 0), numberOr(run.fontSize, 12) * 1.05);
      const charX = Array.isArray(run.charX) ? run.charX : [];
      const textLength = typeof run.text === "string" ? run.text.length : 0;
      const startOffset = charOffsetAt(charX, start, width, textLength);
      const endOffset = charOffsetAt(charX, end, width, textLength);
      const rectWidth = Math.max(2, endOffset - startOffset);
      return {
        x: x + startOffset - 1.5,
        y: y - 1,
        width: rectWidth + 3,
        height: height + 2,
      };
    }

    function charOffsetAt(charX, index, width, textLength) {
      const direct = Number(charX[index]);
      if (Number.isFinite(direct)) {
        return direct;
      }
      if (textLength <= 0) {
        return 0;
      }
      return width * Math.max(0, Math.min(index, textLength)) / textLength;
    }

    function numberOr(value, fallback) {
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    }

    function formatSvgNumber(value) {
      return String(Math.round(value * 1000) / 1000);
    }

    // app.js

    const state = {

    async function runSearch() {
      if (!state.rhwp) {
        throw new Error("rhwp is not initialized");
      }
      const query = searchEl.value;
      if (!query) {
        clearSearchResults();
        return;
      }
      if (state.documents.length === 0) {
        summaryEl.textContent = state.localDocuments.length === 0 ? t("summary.chooseFolder") : t("summary.noFilesMatch");
        return;
      }

      const runId = ++state.searchRun;
      state.searching = true;
      state.searchResults = [];
      state.scanErrors = [];
      state.preview = null;
      state.scanned = 0;
      state.totalMatches = 0;
      state.workerFallbackError = "";
      searchButtonEl.disabled = true;
      workerCountEl.disabled = true;
      const workerCount = resolveWorkerCount();
      state.lastWorkerCount = workerCount;
      setStatus("searching", "busy");
      progressEl.hidden = false;
      progressEl.value = 0;
      progressEl.max = Math.max(1, state.documents.length);
      resultsEl.textContent = "";
      renderPreview();
      renderMetrics();

      if (state.workerSupported && workerCount > 0) {
        await searchWithWorkers(runId, query, caseEl.checked, workerCount);
      } else {
        await searchSequentially(runId, query, caseEl.checked);
      }

      state.searching = false;
      searchButtonEl.disabled = false;
      workerCountEl.disabled = false;
      progressEl.hidden = true;
      setStatus("ready");
      renderSearchSummary(state.totalMatches);
      renderResultList(query, caseEl.checked);
      renderMetrics();
      updateReadyState();
    }

    async function searchDescriptor(documentIndex, descriptor, query, caseSensitive) {
      const bytes = await descriptor.getBytes();
      const doc = new state.rhwp.HwpDocument(bytes);
      try {
        const pages = doc.pageCount();
        const occurrences = [];
        let count = 0;
        let previewPage = -1;

        for (let page = 0; page < pages; page += 1) {
          const text = extractPageText(doc, page);
          const matches = findTextMatches(text, query, caseSensitive);
          if (matches.length > 0 && previewPage === -1) {
            previewPage = page;
          }
          count += matches.length;
          for (const match of matches) {
            occurrences.push({
              page: page + 1,
              index: match.index,
              length: match.length,
              snippet: match.snippet,
            });
          }
        }

        return {
          documentIndex,
          name: descriptor.name,
          format: descriptor.format,
          rawFormat: descriptor.format,
          size: descriptor.size,
          lastModified: descriptor.lastModified,
          path: descriptor.path,
          source: descriptor.source,
          pages,
          count,
          occurrences,
          previewPage,
        };
      } finally {
        doc.free();
      }
    }

    async function searchSequentially(runId, query, caseSensitive) {
      state.lastWorkerCount = 1;
      for (const [documentIndex, descriptor] of state.documents.entries()) {
        if (runId !== state.searchRun) {
          return;
        }
        summaryEl.textContent = t("summary.progress", { scanned: documentIndex + 1, total: state.documents.length });
        try {
          const result = await searchDescriptor(documentIndex, descriptor, query, caseSensitive);
          handleSearchResult(result, query, caseSensitive);
        } catch (error) {
          handleSearchError(descriptor.path, error);
        }
      }
    }

    async function searchWithWorkers(runId, query, caseSensitive, workerCount) {
      const workers = [];
      let nextIndex = 0;

      try {
        for (let index = 0; index < workerCount; index += 1) {
          const worker = createSearchWorker();
          workers.push(worker);
          await worker.ready;
        }

        await Promise.all(workers.map((worker) => runWorkerLane(worker)));
      } catch (error) {
        if (state.scanned === 0) {
          state.workerFallbackError = error instanceof Error ? error.message : String(error);
          await searchSequentially(runId, query, caseSensitive);
        } else {
          state.scanErrors.push({
            path: "worker-pool",
            error: error instanceof Error ? error.message : String(error),
          });
        }
      } finally {
        for (const worker of workers) {
          worker.terminate();
        }
      }

      async function runWorkerLane(worker) {
        while (nextIndex < state.documents.length && runId === state.searchRun) {
          const documentIndex = nextIndex;
          nextIndex += 1;
          const descriptor = state.documents[documentIndex];
          summaryEl.textContent = t("summary.progress", { scanned: state.scanned, total: state.documents.length });

          try {
            const bytes = await descriptor.getBytes();
            const buffer = transferableBuffer(bytes);
            const result = await worker.search({
              documentIndex,
              descriptor: publicDescriptor(descriptor),
              query,
              caseSensitive,
              bytes: buffer,
            }, [buffer]);
            handleSearchResult(result, query, caseSensitive);
          } catch (error) {
            handleSearchError(descriptor.path, error);
          }
        }
      }
    }

    function handleSearchResult(result, query, caseSensitive) {
      state.scanned += 1;
      progressEl.value = state.scanned;
      if (result.count > 0) {
        result.query = query;
        result.caseSensitive = caseSensitive;
        result.rawFormat = state.documents[result.documentIndex]?.format || result.rawFormat || result.format;
        result.size = state.documents[result.documentIndex]?.size ?? result.size;
        result.lastModified = state.documents[result.documentIndex]?.lastModified ?? result.lastModified;
        state.searchResults.push(result);
        sortSearchResults();
        state.totalMatches += result.count;
        renderResultList(query, caseSensitive);
      }
      summaryEl.textContent = t("summary.progress", { scanned: state.scanned, total: state.documents.length });
      renderMetrics();
    }

    function handleSearchError(path, error) {
      state.scanned += 1;
      progressEl.value = state.scanned;
      state.scanErrors.push({
        path,
        error: error instanceof Error ? error.message : String(error),
      });
      summaryEl.textContent = t("summary.progress", { scanned: state.scanned, total: state.documents.length });
      renderMetrics();
    }

    function publicDescriptor(descriptor) {
      return {
        name: descriptor.name,
        label: descriptor.label,
        format: descriptor.format,
        size: descriptor.size,
        lastModified: descriptor.lastModified,
        path: descriptor.path,
        repoPath: descriptor.repoPath,
        source: descriptor.source,
      };
    }

    function transferableBuffer(bytes) {
      if (bytes.byteOffset === 0 && bytes.byteLength === bytes.buffer.byteLength) {
        return bytes.buffer;
      }
      return bytes.buffer.slice(bytes.byteOffset, bytes.byteOffset + bytes.byteLength);
    }

    function handleFilterChange() {
      resetSearchState();
      syncDocuments();
      renderPreview();
      renderIdleSummary();
      updateReadyState();
    }

    function handleSortChange() {
      syncDocuments();
      sortSearchResults();
      if (state.searchResults.length > 0) {
        renderSearchSummary(state.totalMatches);
        renderResultList(searchEl.value, caseEl.checked);
      } else {
        renderIdleSummary();
      }
      updateReadyState();
    }

    function resetSearchState() {
      state.searchRun += 1;
      state.searching = false;
      state.searchResults = [];
      state.scanErrors = [];
      state.preview = null;
      state.scanned = 0;
      state.totalMatches = 0;
      state.workerFallbackError = "";
      searchButtonEl.disabled = false;
      progressEl.hidden = true;
      setStatus("ready");
    }

    function handleGroupLevelChange() {
      syncGroupLevelSlider(currentGroupLevel());
      if (state.searchResults.length > 0) {
        renderResultList(searchEl.value, caseEl.checked);
      }
      updateReadyState();
    }

    function setGroupLevel(groupLevel) {
      const nextGroupLevel = Object.values(GROUP_LEVEL).includes(groupLevel) ? groupLevel : GROUP_LEVEL.page;
      if (groupLevelEl.value === nextGroupLevel) {
        syncGroupLevelSlider(nextGroupLevel);
        return;
      }
      groupLevelEl.value = nextGroupLevel;
      groupLevelEl.dispatchEvent(new Event("change", { bubbles: true }));
    }

    function syncGroupLevelSlider(groupLevel) {
      groupLevelSliderEl.dataset.value = groupLevel;
      for (const button of groupLevelButtons) {
        button.setAttribute("aria-checked", String(button.dataset.groupLevel === groupLevel));
      }
    }

    function syncDocuments() {
      const pathNeedle = pathFilterEl.value.trim().toLocaleLowerCase();
      state.documents = state.localDocuments.filter((doc) => {
        const format = doc.format.toLocaleLowerCase();
        const typeAllowed = (format === "hwp" && hwpFilterEl.checked) || (format === "hwpx" && hwpxFilterEl.checked);
        const pathAllowed = !pathNeedle || doc.path.toLocaleLowerCase().includes(pathNeedle);
        return typeAllowed && pathAllowed;
      }).sort(compareDocuments);
      state.lastWorkerCount = resolveWorkerCount();
      renderMetrics();
    }

    function compareDocuments(left, right) {
      const field = currentSortField();
      const direction = currentSortDirection() === SORT_DIRECTION.desc ? -1 : 1;
      const primary = compareSortValues(sortValue(left, field), sortValue(right, field));
      if (primary !== 0) {
        return primary * direction;
      }
      return left.path.localeCompare(right.path, undefined, { numeric: true, sensitivity: "base" });
    }

    function sortSearchResults() {
      state.searchResults.sort(compareDocuments);
    }

    function sortValue(document, field) {
      if (field === SORT_FIELD.name) {
        return document.name;
      }
      if (field === SORT_FIELD.modified) {
        return Number(document.lastModified) || 0;
      }
      if (field === SORT_FIELD.size) {
        return Number(document.size) || 0;
      }
      if (field === SORT_FIELD.type) {
        return document.format;
      }
      if (field === SORT_FIELD.matches) {
        return Number(document.count) || 0;
      }
      return document.path;
    }

    function compareSortValues(left, right) {
      if (typeof left === "number" || typeof right === "number") {
        return (Number(left) || 0) - (Number(right) || 0);
      }
      return String(left || "").localeCompare(String(right || ""), undefined, { numeric: true, sensitivity: "base" });
    }

    function currentSortField() {
      return Object.values(SORT_FIELD).includes(state.sortField) ? state.sortField : SORT_FIELD.path;
    }

    function currentSortDirection() {
      return Object.values(SORT_DIRECTION).includes(state.sortDirection) ? state.sortDirection : SORT_DIRECTION.asc;
    }

    function toggleSortField(field) {
      const nextField = Object.values(SORT_FIELD).includes(field) ? field : SORT_FIELD.path;
      const nextDirection = currentSortField() === nextField && currentSortDirection() === SORT_DIRECTION.asc
        ? SORT_DIRECTION.desc
        : SORT_DIRECTION.asc;
      setSort(nextField, nextDirection);
    }

    function setSort(field, direction = currentSortDirection()) {
      state.sortField = Object.values(SORT_FIELD).includes(field) ? field : SORT_FIELD.path;
      state.sortDirection = Object.values(SORT_DIRECTION).includes(direction) ? direction : SORT_DIRECTION.asc;
      syncSortHeader();
      handleSortChange();
    }

    function syncSortHeader() {
      const field = currentSortField();
      const direction = currentSortDirection();
      for (const button of sortHeaderButtons) {
        const active = button.dataset.sortField === field;
        button.setAttribute("aria-sort", active ? (direction === SORT_DIRECTION.asc ? "ascending" : "descending") : "none");
        const indicator = button.querySelector(".sort-indicator");
        if (indicator) {
          indicator.textContent = active ? (direction === SORT_DIRECTION.asc ? "↑" : "↓") : "";
        }
      }
    }

    function initializeLanguage() {
      const initialLanguage = readLanguageFromUrl() || readStoredLanguage() || "en";
      applyLanguagePreference(initialLanguage);
      languageSelectEl.addEventListener("change", () => {
        applyLanguagePreference(languageSelectEl.value);
        writeStoredLanguage(state.language);
        if (window.__HWP_SINGLE_HTML_READY__) {
          updateReadyState();
        }
      });
    }

    function applyLanguagePreference(language) {
      const currentWorkerValue = workerCountEl.value || "auto";
      state.language = I18n.setLanguage(language);
      languageSelectEl.value = state.language;
      I18n.translateDocument();
      syncThemeButton();
      syncSortHeader();
      setStatus(state.statusKey, state.statusState);
      populateWorkerOptions(currentWorkerValue);
      renderMetrics();
      renderPreview();
      if (state.searchResults.length > 0) {
        renderSearchSummary(state.totalMatches);
        renderResultList(searchEl.value, caseEl.checked);
      } else if (!state.searching) {
        renderIdleSummary();
      }
    }

    function readLanguageFromUrl() {
      try {
        const language = new URLSearchParams(window.location.search).get("lang");
        return I18n.normalizeLanguage(language) === language ? language : "";
      } catch {
        return "";
      }
    }

    function readStoredLanguage() {
      try {
        const language = window.localStorage.getItem(LANGUAGE_STORAGE_KEY);
        return I18n.normalizeLanguage(language) === language ? language : "";
      } catch {
        return "";
      }
    }

    function writeStoredLanguage(language) {
      try {
        window.localStorage.setItem(LANGUAGE_STORAGE_KEY, I18n.normalizeLanguage(language));
      } catch {
        // Storage can be unavailable for locked-down local file contexts.
      }
    }

    function t(key, params) {
      return I18n.t(key, params);
    }

    function initializeTheme() {
      const initialPreference = readThemeFromUrl() || readStoredTheme() || "system";
      applyThemePreference(initialPreference);
      themeSelectEl.addEventListener("change", () => {
        applyThemePreference(themeSelectEl.value);
        writeStoredTheme(state.themePreference);
        if (window.__HWP_SINGLE_HTML_READY__) {
          updateReadyState();
        }
      });
      themeButtonEl.addEventListener("click", () => {
        applyThemePreference(nextThemePreference());
        writeStoredTheme(state.themePreference);
        if (window.__HWP_SINGLE_HTML_READY__) {
          updateReadyState();
        }
      });

      if (!systemThemeMedia) {
        return;
      }

      const handleSystemThemeChange = () => {
        if (state.themePreference === "system") {
          applyThemePreference("system");
          if (window.__HWP_SINGLE_HTML_READY__) {
            updateReadyState();
          }
        }
      };

      if (typeof systemThemeMedia.addEventListener === "function") {
        systemThemeMedia.addEventListener("change", handleSystemThemeChange);
      } else if (typeof systemThemeMedia.addListener === "function") {
        systemThemeMedia.addListener(handleSystemThemeChange);
      }
    }

    function applyThemePreference(preference) {
      const normalizedPreference = normalizeThemePreference(preference);
      const systemTheme = systemThemeMedia?.matches ? "dark" : "light";
      const resolvedTheme = normalizedPreference === "system" ? systemTheme : normalizedPreference;
      state.themePreference = normalizedPreference;
      state.theme = resolvedTheme;
      document.documentElement.dataset.theme = resolvedTheme;
      document.documentElement.dataset.themePreference = normalizedPreference;
      document.documentElement.style.colorScheme = resolvedTheme;
      themeSelectEl.value = normalizedPreference;
      syncThemeButton();
    }

    function syncThemeButton() {
      themeButtonEl.dataset.themePreference = state.themePreference;
      themeButtonLabelEl.textContent = t("theme." + state.themePreference);
    }

    function nextThemePreference() {
      if (state.themePreference === "system") {
        return "light";
      }
      if (state.themePreference === "light") {
        return "dark";
      }
      return "system";
    }

    function normalizeThemePreference(preference) {
      return isThemePreference(preference) ? preference : "system";
    }

    function readThemeFromUrl() {
      try {
        const theme = new URLSearchParams(window.location.search).get("theme");
        return isThemePreference(theme) ? theme : "";
      } catch {
        return "";
      }
    }

    function readStoredTheme() {
      try {
        const theme = window.localStorage.getItem(THEME_STORAGE_KEY);
        return isThemePreference(theme) ? theme : "";
      } catch {
        return "";
      }
    }

    function isThemePreference(value) {
      return value === "light" || value === "dark" || value === "system";
    }

    function writeStoredTheme(theme) {
      try {
        window.localStorage.setItem(THEME_STORAGE_KEY, normalizeThemePreference(theme));
      } catch {
        // Storage can be unavailable for locked-down local file contexts.
      }
    }

    function updateReadyState() {
      window.__HWP_SINGLE_HTML_READY__ = diagnosticState();
    }

    function diagnosticState() {
      return {
        ok: true,
        parsedOnLoad: false,
        sampleCount: 0,
        localCount: state.localDocuments.length,
        documentCount: state.documents.length,
        scanErrors: state.scanErrors.length,
        scanned: state.scanned,
        totalMatches: state.totalMatches,
        workerSupported: state.workerSupported,
        workerCount: state.lastWorkerCount,
        cpuThreads: state.cpuThreads,
        maxWorkers: state.maxWorkers,
        autoWorkerLimit: state.autoWorkerLimit,
        workerFallbackError: state.workerFallbackError,
        wasmSource: state.wasmSource,
        searchResultCount: state.searchResults.length,
        theme: state.theme,
        themePreference: state.themePreference,
        language: state.language,
        groupLevel: groupLevelEl.value,
        sortField: currentSortField(),
        sortDirection: currentSortDirection(),
        errorDetailsOpen: state.errorDetailsOpen,
        previewOpen: Boolean(state.preview),
        samples: state.documents.map(({ name, format, source, path, size, lastModified }) => ({
          name,
          format,
          source,
          path,
          size,
          lastModified,
          loaded: false,
        })),
        results: state.searchResults.map(({ name, format, pages, count, path, size, lastModified }) => ({
          name,
          format,
          pages,
          count,
          path,
          size,
          lastModified,
        })),
      };
    }

    function renderIdleSummary() {
      if (state.documents.length === 0 && state.localDocuments.length > 0) {
        summaryEl.textContent = t("summary.noFilesMatch");
      } else {
        summaryEl.textContent = state.documents.length === 0
          ? t("summary.idle")
          : t("summary.queued", { count: state.documents.length });
      }
      resultsEl.textContent = "";
      renderMetrics();
    }

    function renderSearchSummary(totalMatches) {
      const errorNote = state.scanErrors.length > 0 ? t("summary.errors", { count: state.scanErrors.length }) : "";
      summaryEl.textContent = t("summary.search", {
        matches: totalMatches,
        files: state.searchResults.length,
        errors: errorNote,
      });
    }

    function clearSearchResults() {
      state.searchRun += 1;
      state.searching = false;
      state.searchResults = [];
      state.scanErrors = [];
      state.preview = null;
      state.scanned = 0;
      state.totalMatches = 0;
      state.workerFallbackError = "";
      searchButtonEl.disabled = false;
      progressEl.hidden = true;
      setStatus("ready");
      renderPreview();
      renderIdleSummary();
      updateReadyState();
    }

    function renderMetrics() {
      sourceCountEl.textContent = state.localDocuments.length > 0 && state.documents.length !== state.localDocuments.length
        ? t("summary.queuedFiltered", { visible: state.documents.length, total: state.localDocuments.length })
        : t("summary.queued", { count: state.documents.length });
      metricDocsEl.textContent = String(state.documents.length);
      metricScannedEl.textContent = String(state.scanned);
      metricMatchesEl.textContent = String(state.totalMatches);
      metricWorkersEl.textContent = String(state.lastWorkerCount || resolveWorkerCount());
      metricErrorsEl.textContent = String(state.scanErrors.length);
      if (state.scanErrors.length === 0) {
        state.errorDetailsOpen = false;
      }
      errorDetailsToggleEl.disabled = state.scanErrors.length === 0;
      errorDetailsToggleEl.setAttribute("aria-expanded", String(state.errorDetailsOpen && state.scanErrors.length > 0));
      renderErrorDetails();
    }

    function renderErrorDetails() {
      const shouldShow = state.errorDetailsOpen && state.scanErrors.length > 0;
      errorDetailsToggleEl.setAttribute("aria-expanded", String(shouldShow));
      errorDetailsEl.hidden = !shouldShow;
      errorDetailsEl.textContent = "";
      if (!shouldShow) {
        return;
      }

      for (const scanError of state.scanErrors) {
        const item = document.createElement("article");
        item.className = "error-detail-item";

        const path = document.createElement("span");
        path.className = "error-detail-path";
        path.textContent = t("errors.path") + ": " + (scanError.path || "");

        const message = document.createElement("span");
        message.className = "error-detail-message";
        message.textContent = t("errors.message") + ": " + (scanError.error || "");

        item.append(path, message);
        errorDetailsEl.append(item);
      }
    }

    function setStatus(key, stateName = "ready") {
      state.statusKey = key;
      state.statusState = stateName;
      statusEl.textContent = t("status." + key);
      statusEl.dataset.state = stateName;
    }

    function createSearchWorker() {
      return SearchWorkerClient.create({
        workerUrl: getWorkerUrl(),
        rhwpJs: payload.rhwpJs,
        rhwpWasmBytes: state.rhwpWasmBytes,
      });
    }

    function getWorkerUrl() {
      if (!state.workerUrl) {
        state.workerUrl = URL.createObjectURL(new Blob([workerSource()], { type: "text/javascript" }));
      }
      return state.workerUrl;
    }

    function workerSource() {
      return payload.workerJs;
    }

    function populateWorkerOptions(preferredValue = workerCountEl.value || "auto") {
      workerCountEl.textContent = "";
      const autoOption = document.createElement("option");
      autoOption.value = "auto";
      autoOption.textContent = t("worker.auto");
      workerCountEl.append(autoOption);

      for (let count = 1; count <= state.maxWorkers; count += 1) {
        const option = document.createElement("option");
        option.value = String(count);
        option.textContent = t("worker.count", { count });
        workerCountEl.append(option);
      }

      workerCountEl.value = [...workerCountEl.options].some((option) => option.value === preferredValue) ? preferredValue : "auto";
      workerCountEl.disabled = !state.workerSupported;
    }

    function resolveWorkerCount() {
      if (!state.workerSupported) {
        return 1;
      }

      const selected = workerCountEl.value;
      if (selected !== "auto") {
        return Math.max(1, Math.min(Number(selected) || 1, state.maxWorkers, Math.max(1, state.documents.length || 1)));
      }

      const automatic = Math.max(1, Math.min(state.autoWorkerLimit, state.maxWorkers));
      return Math.max(1, Math.min(automatic, Math.max(1, state.documents.length || 1)));
    }

    function detectCpuThreads() {
      return Math.max(1, Math.floor(Number(navigator.hardwareConcurrency) || 2));
    }

    function installMeasureTextWidth() {
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");
      globalThis.measureTextWidth = (font, text) => {
        context.font = font;
        return context.measureText(text).width;
      };
    }
  </script>
</body>
</html>
